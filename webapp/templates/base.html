<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Xtrava{% endblock %}</title>
  <script>
    // Set the theme before first paint to avoid a flash of the wrong theme.
    (function () {
      var saved = localStorage.getItem('theme');
      var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="brand-mark">✦</span> Xtrava</div>
    <nav>
      <a href="{{ url_for('dashboard') }}"
         class="{{ 'active' if request.endpoint == 'dashboard' else '' }}">Dashboard</a>
      <a href="{{ url_for('activities') }}"
         class="{{ 'active' if request.endpoint == 'activities' else '' }}">Activities</a>
      <a href="{{ url_for('audit_log') }}"
         class="{{ 'active' if request.endpoint == 'audit_log' else '' }}">Audits</a>
    </nav>
    <button type="button" class="theme-toggle" id="theme-toggle"
            aria-label="Toggle dark mode" title="Toggle dark mode">
      <span class="moon">🌙</span><span class="sun">☀️</span>
    </button>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
    document.getElementById('theme-toggle').addEventListener('click', function () {
      var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });
  </script>
</body>
</html>
